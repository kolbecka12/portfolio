<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Andie Kolbeck — Photography</title>

<style>
  :root {
    --bg: #fdfdfb;
    --ink: #16140f;
    --ink-soft: #4a4640;
    --ink-muted: #8a857c;
    --rule: #e7e3db;
    --gap: 18px;
    --serif: "Playfair Display", Georgia, serif;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  /* Cinematic page transitions */
  .page-fade-enter { opacity: 0; }
  .page-fade-enter-active { opacity: 1; transition: opacity 700ms ease; }
  .page {
    animation: pageIn 400ms ease both;
  }
  @keyframes pageIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
  .img-fade {
    animation: imgIn 1100ms ease both;
  }
  @keyframes imgIn {
    0% { opacity: 0; transform: scale(1.015); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Hamburger */
  .hamburger {
    width: 28px; height: 22px; position: relative; cursor: pointer;
    background: none; border: none; padding: 0;
  }
  .hamburger span {
    display: block; position: absolute; left: 0; right: 0; height: 1px;
    background: var(--ink); transition: transform 300ms ease, opacity 200ms ease, top 300ms ease;
  }
  .hamburger span:nth-child(1) { top: 4px; }
  .hamburger span:nth-child(2) { top: 11px; }
  .hamburger span:nth-child(3) { top: 18px; }
  .hamburger.open span:nth-child(1) { top: 11px; transform: rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { top: 11px; transform: rotate(-45deg); }

  /* Slide menu overlay */
  .menu-overlay {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 90;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 400ms ease;
  }
  .menu-overlay.open { opacity: 1; pointer-events: auto; }
  .menu-overlay nav {
    display: flex; flex-direction: column; gap: 28px; align-items: center;
  }
  .menu-overlay nav a {
    font-family: var(--serif); font-size: clamp(48px, 8vw, 96px);
    font-weight: 400; letter-spacing: -0.01em; line-height: 1;
    transform: translateY(20px); opacity: 0;
    transition: transform 700ms cubic-bezier(.2,.7,.2,1), opacity 600ms ease;
  }
  .menu-overlay.open nav a { transform: translateY(0); opacity: 1; }
  .menu-overlay nav a:nth-child(1){ transition-delay: 100ms; }
  .menu-overlay nav a:nth-child(2){ transition-delay: 180ms; }
  .menu-overlay nav a:nth-child(3){ transition-delay: 260ms; }
  .menu-overlay nav a:nth-child(4){ transition-delay: 340ms; }
  .menu-overlay nav a:nth-child(5){ transition-delay: 420ms; }
  .menu-overlay nav a:hover { font-style: italic; }

  /* Topbar (used on About, Gallery, Lightbox, Admin) */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 40px;
    background: linear-gradient(to bottom, var(--bg), transparent);
    pointer-events: none;
  }
  .topbar > * { pointer-events: auto; }
  .topbar .logo {
    font-family: var(--serif); font-size: 22px; letter-spacing: 0.02em;
    font-weight: 400;
  }
  .topbar .crumb {
    font-family: var(--serif); font-size: 22px; font-weight: 400;
    color: var(--ink-soft);
  }
  .topbar .crumb em { font-style: italic; color: var(--ink); }
  .topbar .crumb .sep { margin: 0 12px; color: var(--ink-muted); font-style: normal;}

  /* Image placeholder shimmer */
  .img-shell { background: var(--shell, #efece6); position: relative; overflow: hidden; }
  .img-shell::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
    transform: translateX(-100%);
    animation: shimmer 1.6s infinite;
  }
  @keyframes shimmer { to { transform: translateX(100%); } }
  .img-shell.loaded::before { display: none; }
  .img-shell img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* Buttons */
  .btn {
    font-family: var(--sans); font-size: 12px; letter-spacing: 0.16em;
    text-transform: uppercase; font-weight: 400;
    padding: 14px 24px; border: 1px solid var(--ink); background: transparent;
    color: var(--ink); cursor: pointer;
    transition: background 200ms ease, color 200ms ease;
  }
  .btn:hover { background: var(--ink); color: var(--bg); }
  .btn-ghost { border: none; padding: 8px 12px; }
  .btn-ghost:hover { background: transparent; color: var(--ink-muted); }

  /* Input */
  .field {
    display: flex; flex-direction: column; gap: 6px;
  }
  .field label {
    font-family: var(--sans); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-muted);
  }
  .field input, .field textarea, .field select {
    font-family: var(--serif); font-size: 18px; color: var(--ink);
    background: transparent; border: none; border-bottom: 1px solid var(--rule);
    padding: 10px 0; outline: none;
    transition: border-color 200ms ease;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--ink);
  }
  .field textarea { resize: vertical; min-height: 60px; font-size: 16px; }

  /* Hide scrollbar visually but keep scroll */
  .clean-scroll::-webkit-scrollbar { width: 0; }

  /* Util */
  .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
</style>
</head>
<body>
