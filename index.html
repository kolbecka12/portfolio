<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <style>
    /* =============================================
       HOMEPAGE — hero, intro, gallery links
       ============================================= */

    body {
      background: var(--color-black);
      color: var(--color-cream);
    }

    .site-header {
      background: transparent;
      border-bottom-color: rgba(245, 240, 232, 0.12);
      position: fixed;
      width: 100%;
    }

    .site-title {
      color: var(--color-cream);
    }

    .site-nav a {
      color: rgba(245, 240, 232, 0.6);
    }

    .site-nav a:hover,
    .site-nav a.active {
      color: var(--color-cream);
    }

    .site-nav a::after {
      background: var(--color-cream);
    }

    .nav-toggle {
      color: var(--color-cream);
    }

    @media (max-width: 599px) {
      .site-header {
        border-bottom-color: rgba(245, 240, 232, 0.1);
        background: rgba(10, 10, 10, 0.95);
      }
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: var(--page-padding);
      padding-bottom: clamp(2.5rem, 8vw, 5rem);
      position: relative;
      overflow: hidden;
      background-image: url('https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1920&q=80');
      background-size: cover;
      background-position: center;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 700px;
    }

    .hero-eyebrow {
      font-family: var(--font-body);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245, 240, 232, 0.5);
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 400;
      line-height: 1.05;
      color: var(--color-cream);
      margin-bottom: 1.5rem;
    }

    .hero-desc {
      font-size: 1rem;
      line-height: 1.75;
      color: rgba(245, 240, 232, 0.65);
      max-width: 480px;
      margin-bottom: 2.5rem;
    }

    .hero-links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .hero-link {
      font-family: var(--font-body);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-cream);
      padding-bottom: 2px;
      border-bottom: 1px solid rgba(245, 240, 232, 0.4);
      transition: border-color 200ms ease;
    }

    .hero-link:hover {
      border-color: var(--color-cream);
    }

    /* Intro section */
    .intro-section {
      background: var(--color-offwhite);
      color: var(--color-black);
      padding: clamp(3rem, 8vw, 6rem) var(--page-padding);
    }

    .intro-inner {
      max-width: 680px;
      margin: 0 auto;
    }

    .intro-label {
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-lightgrey);
      margin-bottom: 1.5rem;
    }

    .intro-text {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 2.5vw, 1.6rem);
      line-height: 1.55;
      font-weight: 400;
      font-style: italic;
      color: var(--color-darkgrey);
      margin-bottom: 2rem;
    }

    .intro-link {
      font-family: var(--font-body);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-midgrey);
      border-bottom: 1px solid #ccc;
      padding-bottom: 2px;
      transition: color 200ms ease, border-color 200ms ease;
    }

    .intro-link:hover {
      color: var(--color-black);
      border-color: var(--color-black);
    }

    /* Gallery preview links */
    .gallery-links-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .gallery-link-card {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      min-height: clamp(220px, 35vw, 420px);
      padding: clamp(1.5rem, 4vw, 3rem);
      background: var(--color-darkgrey);
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: var(--color-cream);
    }

    .gallery-link-card:nth-child(2) {
      background: var(--color-midgrey);
    }

    .gallery-card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,10,0.3);
      transition: background 300ms ease;
    }

    .gallery-link-card:hover .gallery-card-overlay {
      background: rgba(10,10,10,0.1);
    }

    .gallery-card-content {
      position: relative;
      z-index: 1;
    }

    .gallery-card-label {
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.5);
      margin-bottom: 0.5rem;
    }

    .gallery-card-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 400;
    }

    @media (max-width: 599px) {
      .gallery-links-section {
        grid-template-columns: 1fr;
      }
    }

    .site-footer {
      background: var(--color-black);
      color: rgba(245,240,232,0.25);
      border-top: 1px solid rgba(245,240,232,0.08);
      margin-top: 0;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="site-title">andie kolbeck</a>
    <nav class="site-nav">
<a href="street.html" data-page="street">Street</a>
      <a href="earth.html" data-page="earth">Earth</a>
      <a href="about.html" data-page="about">About</a>
    </nav>
    <button class="nav-toggle" aria-label="Open menu">&#9776;</button>
  </header>

  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <p class="hero-eyebrow">Photography</p>
        <h1>Seeing the<br><em>unseen</em></h1>
        <p class="hero-desc">
          A collection of images from the street and the earth — moments caught in light.
        </p>
        <div class="hero-links">
          <a href="street.html" class="hero-link">Street</a>
          <a href="earth.html" class="hero-link">Earth</a>
          <a href="about.html" class="hero-link">About</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 andie kolbeck. All rights reserved. &nbsp;&middot;&nbsp; <a href="admin.html" class="footer-admin-link">Admin</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initNav);
  </script>
</body>
</html>
